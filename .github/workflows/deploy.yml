name: Deploy Backend

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
            eval $(ssh-agent -s)
            echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
            cd /var/www/fleet-control/fleet-control-back-end
            git pull origin master
            docker exec laravel_api composer install --no-dev --optimize-autoloader
            docker exec laravel_api php artisan migrate --force
            docker exec laravel_api php artisan config:cache
            docker exec laravel_api php artisan route:cache
